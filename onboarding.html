<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Numer — Bem-vindo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:#0B1628;font-family:'DM Sans',sans-serif;color:#fff;display:flex;align-items:flex-end;justify-content:center;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");}
.orb{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(242,107,29,.14) 0%,transparent 70%);top:-180px;right:-150px;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(46,66,112,.35) 0%,transparent 70%);bottom:100px;left:-150px;}

.sheet{position:relative;z-index:1;width:100%;max-width:430px;background:#0F1C35;border-radius:28px 28px 0 0;border:1px solid rgba(242,107,29,.18);border-bottom:none;padding:0 24px 44px;min-height:94vh;display:flex;flex-direction:column;animation:slideUp .4s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:none;opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
@keyframes tap{0%,100%{transform:scale(1);}50%{transform:scale(.88);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

.handle{width:36px;height:4px;background:rgba(255,255,255,.12);border-radius:4px;margin:14px auto 20px;flex-shrink:0;}

/* Header */
.ob-logo{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-shrink:0;}
.ob-logo-mark{width:34px;height:34px;border-radius:9px;background:#1A2B4A;border:1.5px solid rgba(242,107,29,.3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#F26B1D;}
.ob-logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;}
.ob-step-label{margin-left:auto;background:rgba(242,107,29,.1);border:1px solid rgba(242,107,29,.22);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:700;color:#FF8C42;letter-spacing:.4px;}

/* Dots */
.dots{display:flex;gap:5px;align-items:center;justify-content:center;margin-bottom:18px;flex-shrink:0;}
.dot{height:7px;border-radius:100px;background:rgba(255,255,255,.14);transition:all .4s cubic-bezier(.4,0,.2,1);flex-shrink:0;}
.dot.active{background:#F26B1D;box-shadow:0 0 8px rgba(242,107,29,.5);}

/* Step */
.step-wrap{display:flex;flex-direction:column;flex:1;animation:fadeUp .35s ease both;}
.step-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.4px;margin-bottom:6px;color:#fff;}
.step-title em{font-style:normal;color:#F26B1D;}
.step-desc{font-size:13px;color:rgba(255,255,255,.55);line-height:1.65;margin-bottom:16px;}
.step-desc strong{color:rgba(255,255,255,.85);font-weight:600;}

/* ─── MOCKUPS ─── */

/* MOCKUP 1 — Instalar */
.mockup-install{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:16px;padding:16px;margin-bottom:14px;
}
.install-tabs{display:flex;gap:6px;margin-bottom:14px;}
.itab{
  flex:1;padding:8px;border-radius:9px;border:1.5px solid rgba(255,255,255,.1);
  background:transparent;text-align:center;font-size:12px;font-weight:600;
  color:rgba(255,255,255,.4);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;
}
.itab.active{background:rgba(242,107,29,.12);border-color:rgba(242,107,29,.3);color:#F26B1D;}
.install-steps{display:flex;flex-direction:column;gap:8px;}
.istep{display:flex;align-items:flex-start;gap:10px;}
.istep-num{width:22px;height:22px;border-radius:50%;background:#F26B1D;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;margin-top:1px;}
.istep-text{font-size:12px;color:rgba(255,255,255,.65);line-height:1.5;}
.istep-text strong{color:rgba(255,255,255,.9);display:block;font-size:13px;margin-bottom:1px;}
.install-tip{
  background:rgba(242,107,29,.07);border:1px solid rgba(242,107,29,.15);
  border-radius:10px;padding:10px 13px;margin-top:12px;
  font-size:11px;color:rgba(255,255,255,.5);line-height:1.5;
}

/* MOCKUP 2 — Perfil */
.mockup-profile{
  background:#F4F6FB;border-radius:16px;overflow:hidden;margin-bottom:14px;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.mp-topbar{background:#0F1C35;padding:10px 16px;display:flex;align-items:center;gap:8px;}
.mp-topbar-dot{width:8px;height:8px;border-radius:50%;}
.mp-topbar span{font-size:10px;color:rgba(255,255,255,.5);font-weight:500;margin-left:4px;}
.mp-body{padding:16px;}
.mp-avatar-row{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:16px;}
.mp-avatar{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#FEE8D6,#FDD5B8);border:2.5px solid #F26B1D;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;}
.mp-cam{position:absolute;bottom:-4px;right:-4px;width:20px;height:20px;border-radius:6px;background:#F26B1D;border:2px solid #F4F6FB;display:flex;align-items:center;justify-content:center;font-size:10px;}
.mp-hint{font-size:9px;color:#6B7FA8;font-weight:500;}
.mp-field{margin-bottom:10px;}
.mp-label{font-size:9px;font-weight:700;color:#6B7FA8;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
.mp-input{background:#EEF1F8;border:1.5px solid #D8DFF0;border-radius:9px;padding:9px 12px;font-size:12px;color:#0F1C35;font-family:'DM Sans',sans-serif;width:100%;display:flex;align-items:center;justify-content:space-between;}
.mp-input.active{border-color:#F26B1D;background:#fff;}
.mp-cursor{width:1.5px;height:14px;background:#F26B1D;animation:blink .8s infinite;}
.mp-input-text{font-size:12px;color:#0F1C35;}
.mp-save{background:linear-gradient(135deg,#F26B1D,#D45A10);border:none;border-radius:10px;padding:11px;width:100%;color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;margin-top:4px;cursor:pointer;}

/* MOCKUP 3 — Agenda */
.mockup-agenda{background:#F4F6FB;border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.ma-header{background:#F4F6FB;padding:14px 14px 8px;}
.ma-greet{font-size:9px;color:#6B7FA8;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.ma-name{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#0F1C35;}
.ma-name span{color:#F26B1D;}
.ma-prog{height:4px;background:#E2E7F2;border-radius:4px;margin-top:8px;overflow:hidden;}
.ma-prog-fill{height:100%;width:40%;background:linear-gradient(90deg,#D45A10,#FF8C42);border-radius:4px;}
.ma-tabs{display:flex;border-bottom:2px solid #E2E7F2;margin:8px 14px 0;}
.ma-tab{padding:6px 10px;font-size:10px;font-weight:700;color:#9CADC8;cursor:pointer;}
.ma-tab.active{color:#F26B1D;border-bottom:2px solid #F26B1D;margin-bottom:-2px;}
.ma-events{padding:10px 14px;display:flex;flex-direction:column;gap:7px;}
.ma-ev{background:#fff;border:1px solid #E2E7F2;border-radius:10px;padding:9px 10px 9px 13px;display:flex;gap:8px;align-items:center;position:relative;overflow:hidden;}
.ma-ev::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.ma-ev.org::before{background:#F26B1D;}.ma-ev.teal::before{background:#0B8FAC;}.ma-ev.grn::before{background:#1A9E5A;}
.ma-ev-time{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:#0F1C35;min-width:26px;}
.ma-ev-title{font-size:11px;font-weight:600;color:#0F1C35;flex:1;}
.ma-ev-cat{font-size:9px;color:#6B7FA8;}
.ma-ev-badge{padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;}
.ma-fab{position:absolute;bottom:12px;right:14px;width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#F26B1D,#D45A10);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;box-shadow:0 4px 14px rgba(242,107,29,.4);}

/* MOCKUP 4 — Finanças */
.mockup-fin{background:#F4F6FB;border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.mf-header{padding:14px 14px 10px;background:#F4F6FB;}
.mf-saldo-label{font-size:9px;color:#6B7FA8;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.mf-saldo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#0F1C35;}
.mf-cards{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 14px 10px;}
.mf-card{background:#fff;border:1px solid #E2E7F2;border-radius:11px;padding:11px 10px;text-align:center;}
.mf-card-n{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;line-height:1;margin-bottom:3px;}
.mf-card-l{font-size:8px;color:#6B7FA8;font-weight:500;text-transform:uppercase;letter-spacing:.4px;}
.mf-txs{padding:0 14px 12px;display:flex;flex-direction:column;gap:6px;}
.mf-tx{display:flex;gap:8px;align-items:center;background:#fff;border-radius:10px;padding:9px 10px;border:1px solid #E2E7F2;}
.mf-tx-ico{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.mf-tx-ico.e{background:rgba(26,158,90,.1);}
.mf-tx-ico.s{background:rgba(232,40,74,.08);}
.mf-tx-body{flex:1;}
.mf-tx-title{font-size:11px;font-weight:600;color:#0F1C35;}
.mf-tx-cat{font-size:9px;color:#6B7FA8;margin-top:1px;}
.mf-tx-val{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;}
.mf-tx-val.e{color:#1A9E5A;}.mf-tx-val.s{color:#E8284A;}

/* Buttons */
.btn-row{display:flex;gap:10px;margin-top:auto;padding-top:16px;flex-shrink:0;}
.btn-back{flex:1;padding:14px;border-radius:12px;border:1.5px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s;}
.btn-back:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.8);}
.btn-next{flex:2;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#F26B1D,#D45A10);color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 6px 24px rgba(242,107,29,.4);transition:all .2s;}
.btn-next:hover{box-shadow:0 8px 32px rgba(242,107,29,.55);transform:translateY(-1px);}
.btn-next:active{transform:scale(.97);}
.skip-wrap{text-align:center;margin-top:12px;flex-shrink:0;}
.skip-btn{font-size:12px;color:rgba(255,255,255,.22);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;transition:color .2s;}
.skip-btn:hover{color:rgba(255,255,255,.45);}

/* Final */
.final-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;animation:fadeUp .5s ease both;padding:20px 0;}
.final-icon{width:96px;height:96px;border-radius:26px;background:linear-gradient(135deg,rgba(242,107,29,.14),rgba(242,107,29,.05));border:2px solid rgba(242,107,29,.28);display:flex;align-items:center;justify-content:center;font-size:46px;margin:0 auto 22px;animation:pulse 2s infinite;}
.final-title{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.6px;margin-bottom:10px;}
.final-sub{font-size:14px;color:rgba(255,255,255,.55);line-height:1.75;max-width:290px;margin:0 auto 32px;}
.btn-start{width:100%;padding:15px;border-radius:13px;border:none;background:linear-gradient(135deg,#F26B1D,#D45A10);color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 8px 32px rgba(242,107,29,.4);transition:all .2s;}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(242,107,29,.55);}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="sheet" id="sheet">
  <div class="handle"></div>
  <div class="ob-logo">
    <div class="ob-logo-mark">N</div>
    <span class="ob-logo-name">Numer</span>
    <div class="ob-step-label" id="stepLabel">Passo 1 de 4</div>
  </div>
  <div class="dots" id="dots"></div>
  <div id="stepContent"></div>
</div>

<script>
let cur = 0;

const steps = [
  {
    num: 1,
    title: 'Instale na <em>tela inicial</em>',
    desc: 'O Numer funciona como um app instalado no seu celular — <strong>sem precisar de loja de aplicativos</strong>. Siga os passos abaixo para o seu aparelho.',
    render: () => `
      <div class="mockup-install">
        <div class="install-tabs">
          <div class="itab active" id="tab-ios" onclick="showInstallTab('ios')">iPhone</div>
          <div class="itab" id="tab-android" onclick="showInstallTab('android')">Android</div>
        </div>
        <div id="install-content-ios" class="install-steps">
          <div class="istep"><div class="istep-num">1</div><div class="istep-text"><strong>Abra o Safari</strong>Acesse murilorodrigues406.github.io/Numer no Safari (não funciona em outros navegadores)</div></div>
          <div class="istep"><div class="istep-num">2</div><div class="istep-text"><strong>Toque em Compartilhar</strong>O ícone de compartilhar fica na barra inferior do Safari</div></div>
          <div class="istep"><div class="istep-num">3</div><div class="istep-text"><strong>Adicionar à Tela Início</strong>Role a lista e toque nessa opção, depois confirme em Adicionar</div></div>
        </div>
        <div id="install-content-android" class="install-steps" style="display:none;">
          <div class="istep"><div class="istep-num">1</div><div class="istep-text"><strong>Abra o Chrome</strong>Acesse murilorodrigues406.github.io/Numer no Chrome</div></div>
          <div class="istep"><div class="istep-num">2</div><div class="istep-text"><strong>Banner de instalação</strong>Um banner aparece automaticamente na parte inferior da tela</div></div>
          <div class="istep"><div class="istep-num">3</div><div class="istep-text"><strong>Toque em Instalar</strong>Confirme e o Numer aparece na sua tela inicial como um app</div></div>
        </div>
        <div class="install-tip">Depois de instalar, abra sempre pela tela inicial para melhor experiência e acesso offline.</div>
      </div>
    `
  },
  {
    num: 2,
    title: 'Configure seu <em>perfil</em>',
    desc: 'Personalize o Numer com seu nome e foto. Tudo fica <strong>salvo na nuvem</strong> e sincroniza em qualquer dispositivo.',
    render: () => `
      <div class="mockup-profile">
        <div class="mp-topbar">
          <div class="mp-topbar-dot" style="background:#E8284A;"></div>
          <div class="mp-topbar-dot" style="background:#E8A020;"></div>
          <div class="mp-topbar-dot" style="background:#1A9E5A;"></div>
          <span>Numer — Perfil</span>
        </div>
        <div class="mp-body">
          <div class="mp-avatar-row">
            <div class="mp-avatar">👤<div class="mp-cam">📷</div></div>
            <div class="mp-hint">Toque para adicionar sua foto</div>
          </div>
          <div class="mp-field">
            <div class="mp-label">Primeiro nome</div>
            <div class="mp-input active"><span class="mp-input-text">Iris</span><div class="mp-cursor"></div></div>
          </div>
          <div class="mp-field">
            <div class="mp-label">Sobrenome</div>
            <div class="mp-input"><span class="mp-input-text" style="color:#9CADC8;">Opcional</span></div>
          </div>
          <div class="mp-field">
            <div class="mp-label">Frase do dia</div>
            <div class="mp-input"><span class="mp-input-text" style="color:#9CADC8;">Ex: Foco e determinação!</span></div>
          </div>
          <button class="mp-save">Salvar ✓</button>
        </div>
      </div>
    `
  },
  {
    num: 3,
    title: 'Organize sua <em>agenda</em>',
    desc: 'Toque no botão <strong>+</strong> para criar tarefas. Separe Pessoal e Trabalho e acompanhe o progresso do seu dia.',
    render: () => `
      <div class="mockup-agenda" style="position:relative;">
        <div class="ma-header">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div>
              <div class="ma-greet">Bom dia</div>
              <div class="ma-name">Olá, <span>Iris</span></div>
            </div>
            <div style="background:#0F1C35;border-radius:9px;padding:6px 10px;text-align:center;">
              <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#F26B1D;line-height:1;">13</div>
              <div style="font-size:8px;color:rgba(255,255,255,.5);text-transform:uppercase;">Ter</div>
            </div>
          </div>
          <div class="ma-prog"><div class="ma-prog-fill"></div></div>
          <div style="display:flex;justify-content:space-between;margin-top:5px;"><span style="font-size:8px;color:#6B7FA8;">Progresso</span><span style="font-size:8px;color:#F26B1D;font-weight:700;">40%</span></div>
        </div>
        <div class="ma-tabs">
          <div class="ma-tab active">Pessoal</div>
          <div class="ma-tab">Trabalho</div>
        </div>
        <div class="ma-events">
          <div class="ma-ev org">
            <div class="ma-ev-time">07h</div>
            <div style="flex:1;"><div class="ma-ev-title">Café da manhã</div><div class="ma-ev-cat">Manhã</div></div>
            <div class="ma-ev-badge" style="background:rgba(107,63,160,.1);color:#6B3FA0;">Planejado</div>
          </div>
          <div class="ma-ev teal">
            <div class="ma-ev-time">09h</div>
            <div style="flex:1;"><div class="ma-ev-title">Academia</div><div class="ma-ev-cat">Saúde</div></div>
            <div class="ma-ev-badge" style="background:rgba(11,143,172,.1);color:#0B8FAC;">Em andamento</div>
          </div>
          <div class="ma-ev grn">
            <div class="ma-ev-time">12h</div>
            <div style="flex:1;"><div class="ma-ev-title">Almoço</div><div class="ma-ev-cat">Família</div></div>
            <div class="ma-ev-badge" style="background:rgba(26,158,90,.1);color:#1A9E5A;">Concluído</div>
          </div>
        </div>
        <div class="ma-fab">+</div>
      </div>
    `
  },
  {
    num: 4,
    title: 'Controle seu <em>dinheiro</em>',
    desc: 'Registre entradas e saídas, acompanhe o saldo do mês e exporte seu relatório financeiro quando precisar.',
    render: () => `
      <div class="mockup-fin">
        <div class="mf-header">
          <div class="mf-saldo-label">Saldo do mês</div>
          <div class="mf-saldo">R$ 2.450,00</div>
        </div>
        <div class="mf-cards">
          <div class="mf-card"><div class="mf-card-n" style="color:#1A9E5A;">R$ 4.200</div><div class="mf-card-l">Entradas</div></div>
          <div class="mf-card"><div class="mf-card-n" style="color:#E8284A;">R$ 1.750</div><div class="mf-card-l">Saídas</div></div>
        </div>
        <div class="mf-txs">
          <div style="font-size:9px;font-weight:700;color:#9CADC8;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;">RECENTES</div>
          <div class="mf-tx">
            <div class="mf-tx-ico e">💚</div>
            <div class="mf-tx-body"><div class="mf-tx-title">Salário</div><div class="mf-tx-cat">Salário · 01/05</div></div>
            <div class="mf-tx-val e">+R$ 4.200</div>
          </div>
          <div class="mf-tx">
            <div class="mf-tx-ico s">🔴</div>
            <div class="mf-tx-body"><div class="mf-tx-title">Aluguel</div><div class="mf-tx-cat">Moradia · 05/05</div></div>
            <div class="mf-tx-val s">-R$ 1.200</div>
          </div>
          <div class="mf-tx">
            <div class="mf-tx-ico s">🔴</div>
            <div class="mf-tx-body"><div class="mf-tx-title">Supermercado</div><div class="mf-tx-cat">Alimentação · 08/05</div></div>
            <div class="mf-tx-val s">-R$ 550</div>
          </div>
        </div>
      </div>
    `
  }
];

function renderDots(){
  document.getElementById('dots').innerHTML = steps.map((_,i) =>
    `<div class="dot ${i===cur?'active':''}" style="width:${i===cur?22:7}px;"></div>`
  ).join('');
  document.getElementById('stepLabel').textContent = `Passo ${cur+1} de ${steps.length}`;
}

function renderStep(){
  renderDots();
  const s = steps[cur];
  const isLast = cur === steps.length - 1;
  document.getElementById('stepContent').innerHTML = `
    <div class="step-wrap">
      <div class="step-title">${s.title}</div>
      <div class="step-desc">${s.desc}</div>
      ${s.render()}
      <div class="btn-row">
        ${cur > 0 ? `<button class="btn-back" onclick="prev()">← Voltar</button>` : ''}
        <button class="btn-next" onclick="next()">${isLast ? '🚀 Começar a usar' : 'Próximo →'}</button>
      </div>
      ${!isLast ? `<div class="skip-wrap"><button class="skip-btn" onclick="finish()">Pular tutorial</button></div>` : ''}
    </div>
  `;
}

function showInstallTab(tab){
  document.getElementById('tab-ios').classList.toggle('active', tab==='ios');
  document.getElementById('tab-android').classList.toggle('active', tab==='android');
  document.getElementById('install-content-ios').style.display = tab==='ios' ? 'flex' : 'none';
  document.getElementById('install-content-android').style.display = tab==='android' ? 'flex' : 'none';
}

function next(){
  if(cur < steps.length - 1){ cur++; animate(); }
  else { renderFinal(); }
}
function prev(){ if(cur > 0){ cur--; animate(); } }

function animate(){
  const c = document.getElementById('stepContent');
  c.style.opacity='0'; c.style.transform='translateY(10px)';
  setTimeout(()=>{ renderStep(); c.style.transition='opacity .3s,transform .3s'; c.style.opacity='1'; c.style.transform='none'; }, 140);
}

function renderFinal(){
  document.getElementById('dots').innerHTML='';
  document.getElementById('stepLabel').textContent='Pronto!';
  document.getElementById('stepContent').innerHTML=`
    <div class="final-screen">
      <div class="final-icon">🎉</div>
      <div class="final-title">Tudo pronto, Iris!</div>
      <div class="final-sub">Agora você conhece o Numer. Comece organizando seu dia e suas finanças com estratégia.</div>
      <button class="btn-start" onclick="finish()">Abrir o Numer →</button>
    </div>
  `;
}

function finish(){
  const sheet = document.getElementById('sheet');
  sheet.style.transition='transform .4s ease,opacity .4s ease';
  sheet.style.transform='translateY(100%)';
  sheet.style.opacity='0';
  setTimeout(()=>{
    document.body.innerHTML=`
      <div style="position:fixed;inset:0;background:#0B1628;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;">
        <div style="width:60px;height:60px;border-radius:16px;background:#0F1C35;border:2px solid rgba(242,107,29,.3);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:#F26B1D;margin-bottom:18px;">N</div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#fff;margin-bottom:6px;">Abrindo o Numer...</div>
        <div style="font-size:12px;color:rgba(255,255,255,.35);">Redirecionando</div>
      </div>`;
    setTimeout(()=>{ window.location.href='https://murilorodrigues406.github.io/Numer/'; }, 900);
  }, 400);
}

renderStep();
</script>
</body>
</html>
